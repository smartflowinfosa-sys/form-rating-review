<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم تجربتكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background-color: #f8fafc; }
        .star { cursor: pointer; transition: color 0.2s, transform 0.2s; }
        .star:active { transform: scale(0.9); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="main-card" class="bg-white max-w-md w-full rounded-3xl shadow-xl p-8 text-center border border-slate-100 animate-fade-in">
        
        <div class="mb-8">
            <h2 id="client-name" class="text-2xl font-bold text-slate-800 tracking-tight">مطعمنا المتميز</h2>
        </div>

        <p class="text-slate-500 mb-8 font-medium leading-relaxed">نتمنى أن ضيافتنا اليوم كانت بمستوى تطلعاتكم. كيف تقيم تجربتك معنا؟</p>

        <div class="flex justify-center gap-2 mb-8" id="rating-container" dir="ltr">
            <span class="star text-5xl text-slate-200 drop-shadow-sm" data-value="1">★</span>
            <span class="star text-5xl text-slate-200 drop-shadow-sm" data-value="2">★</span>
            <span class="star text-5xl text-slate-200 drop-shadow-sm" data-value="3">★</span>
            <span class="star text-5xl text-slate-200 drop-shadow-sm" data-value="4">★</span>
            <span class="star text-5xl text-slate-200 drop-shadow-sm" data-value="5">★</span>
        </div>

        <button id="submit-btn" onclick="submitRating()" class="hidden w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 shadow-md">إرسال التقييم</button>
        
        <div id="status-msg" class="mt-4 text-sm font-medium"></div>
    </div>

    <script>
        // المتغيرات الأساسية //
        // الرابط الجديد الخاص بك //
        const WEBHOOK_URL = 'https://five-dancers-think.loca.lt/webhook/review-rate'; 

        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('booking_id');
        let selectedRating = 0;

        const stars = document.querySelectorAll('.star');
        const submitBtn = document.getElementById('submit-btn');

        // تفاعل اختيار النجوم
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.getAttribute('data-value'));
                
                stars.forEach((s, index) => {
                    if (index < selectedRating) {
                        s.classList.remove('text-slate-200');
                        s.classList.add('text-yellow-400');
                    } else {
                        s.classList.add('text-slate-200');
                        s.classList.remove('text-yellow-400');
                    }
                });
                
                submitBtn.classList.remove('hidden');
                submitBtn.classList.add('animate-fade-in');
            });
        });

        // وظيفة إرسال البيانات إلى n8n
        async function submitRating() {
            if (!bookingId) {
                alert('عذراً، الرابط غير صالح (رقم الحجز مفقود).');
                return;
            }

            const status = document.getElementById('status-msg');
            status.innerText = "جاري إرسال تقييمك...";
            status.className = "mt-4 text-sm font-medium text-slate-500 animate-pulse";
            
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true' // لتخطي صفحة تحذير Localtunnel
                    },
                    body: JSON.stringify({
                        booking_id: bookingId,
                        rating: selectedRating
                    })
                });

                if (response.ok) {
                    document.getElementById('main-card').innerHTML = `
                        <div class="text-center py-8 animate-fade-in">
                            <div class="text-6xl mb-4">✨</div>
                            <h3 class="text-2xl font-bold text-slate-800 mb-2">شكرًا لتقييمك!</h3>
                            <p class="text-slate-500">تم تسجيل رأيك بنجاح، يسعدنا دائماً خدمتك.</p>
                        </div>`;
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                console.error('Error:', error);
                status.innerText = "حدث خطأ أثناء الإرسال، يرجى التحقق من اتصال الإنترنت.";
                status.className = "mt-4 text-sm font-medium text-red-500";
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
